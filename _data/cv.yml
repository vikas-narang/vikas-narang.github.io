        area: Systems Engineering
        degree: PhD
        date: Expected Dec 2027
        highlights:
          - "Relevant courses: Robotics Systems I, Robotics Systems II, Mobile Robotics, Optimization and Controls, Modern Controls, Reinforcement Learning, Digital Signal Processing, Digital Controls, Engineering Mathematics, Probability and Stochastic Processes, and Vehicle Dynamics and Controls."

      - institution: Michigan Technological University
