    Experience:
      - company: Arizona State University
        position: Research Associate, Dynamics, Systems and Controls Lab
        location: ""
        start_date: 2024
        end_date: 2025
        highlights:
          - Conducting research on teleoperation and motion control for autonomous vehicles using GPS, camera, onboard sensing, and drive-by-wire platforms.
          - Designing and evaluating control strategies with predictive perception for lateral and longitudinal vehicle operation in remote driving environments.
          - Developing control-oriented models to analyze the impact of communication latency in 4G/5G-based vehicle teleoperation systems.
          - Exploring latency-compensation approaches to improve safety, stability, and responsiveness in connected autonomous vehicle teleoperation.

      - company: Cummins Inc
        position: Sr. Technical Specialist, Simulation, Controls and Analytics
        location: ""
        start_date: 2021
        end_date: 2024
        highlights:
          - Led development of ML-based solutions for hybrid and conventional powertrain systems, including diagnostic algorithms, resulting in $14M estimated combined operational and fuel savings.
          - Coordinated PoC projects across analytics and controls teams to reduce downtime by 15%.
          - Performed techno-economic analyses of ICE/HEV platforms using fleet telematics data.
          - Served as SME on data-driven modeling, data strategy, and system behavior alignment.

      - company: Cummins Inc
        position: Technical Specialist, Advanced Dynamic Systems & Controls
        location: ""
        start_date: 2016
        end_date: 2020
        highlights:
          - Led controls development and validation for spark-ignited engines, including natural gas and propane platforms, supporting combustion stability, fuel control, air-path management, and system robustness.
          - Lead calibration development using GT-Power simulations, test-cell data, and vehicle testing to validate air-path and fuel-system control algorithms, improving torque response, combustion stability, transient performance, and drivability.
          - Collaborated with TPMs and cross-functional teams to deliver validated control features from concept through simulation, test-cell evaluation, and vehicle deployment.
          - Applied VOC and FMEA methods to guide control algorithm development and ensure system-level quality, safety, and robustness.

      - company: Cummins Inc
        position: System Performance & Integration Engineer, Advanced Systems Integration
        location: ""
        start_date: 2012
        end_date: 2016
        highlights:
          - Planned and executed performance testing for diesel and spark-ignited engines in test-cell and vehicle environments.
          - Performed combustion, performance, and emissions analysis to support engine calibration, fuel economy improvement, aftertreatment integration, and product readiness for on-highway natural gas powertrain programs.
          - Used GT-Power simulations and system-level models to evaluate engine performance, air-path behavior, fuel-system response, thermal behavior, and integration tradeoffs across operating conditions.
          - Lead test-cell calibration and validation activities, including steady-state and transient testing for combustion stability, emissions compliance, torque response, and system robustness.
          - Led vehicle road-trip and field validation activities for Cummins diesel and natural gas engine platforms, supporting data collection, issue resolution, calibration feedback, and real-world performance evaluation.
          - Defined and managed vehicle and system-level requirements by working closely with controls, calibration, applications, test, and product engineering teams.

